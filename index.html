<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Portfolio</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    /* ---- Hero ---- */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 4rem;
      padding: 8rem 2rem 4rem;
      max-width: var(--max-w);
      margin: 0 auto;
    }
    .hero-text { }
    .hero-eyebrow {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s forwards;
    }
    .hero-name {
      font-family: var(--font-display);
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: var(--ink);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.35s forwards;
    }
    .hero-tagline {
      font-size: 1.1rem;
      color: var(--ink-mid);
      max-width: 420px;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.5s forwards;
    }
    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cream);
      background: var(--ink);
      padding: 0.85rem 1.75rem;
      border-radius: var(--radius);
      transition: background var(--transition), transform var(--transition);
      opacity: 0;
      animation: fadeUp 0.8s 0.65s forwards;
    }
    .hero-cta:hover { background: var(--accent); transform: translateY(-2px); }

    .hero-photo-wrap {
      position: relative;
      opacity: 0;
      animation: fadeIn 1s 0.4s forwards;
    }
    .hero-photo-wrap::before {
      content: '';
      position: absolute;
      inset: -12px -12px 12px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      z-index: 0;
    }
    .hero-photo {
      position: relative;
      z-index: 1;
      width: 100%;
      aspect-ratio: 4/5;
      object-fit: cover;
      border-radius: var(--radius);
      background: var(--border);
    }
    .photo-placeholder {
      width: 100%;
      aspect-ratio: 4/5;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--border) 0%, var(--ink-light) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.5rem;
      color: var(--cream);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }
    .photo-placeholder svg { width: 36px; height: 36px; opacity: 0.6; }

    /* ---- About ---- */
    #about {
      background: var(--ink);
      color: var(--cream);
      padding: 7rem 2rem;
    }
    .about-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 4rem;
      align-items: start;
    }
    .about-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent-light);
    }
    .about-heading {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 400;
      font-style: italic;
      line-height: 1.2;
      margin-top: 1rem;
    }
    .about-body {
      font-size: 1.05rem;
      line-height: 1.8;
      color: rgba(245,241,235,0.8);
      padding-top: 0.5rem;
    }
    .scroll-hint {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-top: 3rem;
    }
    .scroll-hint::before {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--ink-light);
    }

    /* ---- Work Preview ---- */
    #work {
      padding: 7rem 2rem;
    }
    .work-inner {
      max-width: var(--max-w);
      margin: 0 auto;
    }
    .work-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 3.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .work-header h2 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .view-all {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: gap var(--transition);
    }
    .view-all:hover { gap: 0.6rem; }

    /* ---- Cards ---- */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 40px rgba(26,23,20,0.1);
      border-color: var(--ink-light);
    }
    .card-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: linear-gradient(135deg, var(--border), var(--ink-light));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cream);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    .card-body { padding: 1.25rem 1.4rem 1.5rem; }
    .card-meta {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }
    .card-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.6rem;
    }
    .card-summary {
      font-size: 0.875rem;
      color: var(--ink-mid);
      line-height: 1.6;
    }
    .card-arrow {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: 1rem;
      transition: gap var(--transition);
    }
    .card:hover .card-arrow { gap: 0.55rem; }

    /* ---- Divider ---- */
    .section-divider {
      width: 60px;
      height: 2px;
      background: var(--accent);
      margin: 0 auto 5rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 768px) {
      .hero {
        grid-template-columns: 1fr;
        text-align: center;
        gap: 2.5rem;
        padding-top: 6rem;
      }
      .hero-photo-wrap { order: -1; max-width: 280px; margin: 0 auto; }
      .hero-tagline { margin: 0 auto 2.5rem; }
      .about-inner { grid-template-columns: 1fr; gap: 1.5rem; }
    }
  </style>
</head>
<body>

<!-- ============ NAV ============ -->
<nav>
  <a class="nav-logo" id="nav-name" href="index.html">AR</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="pages/experience.html">Experience</a></li>
    <li><a href="pages/projects.html">Projects</a></li>
    <li><a href="pages/contact.html">Contact</a></li>
  </ul>
</nav>

<!-- ============ HERO ============ -->
<section class="hero" id="hero">
  <div class="hero-text">
    <p class="hero-eyebrow" id="hero-eyebrow"></p>
    <h1 class="hero-name" id="hero-name"></h1>
    <p class="hero-tagline" id="hero-tagline"></p>
    <a class="hero-cta" href="#about">
      About me
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg>
    </a>
  </div>
  <div class="hero-photo-wrap">
    <div id="hero-photo-slot" class="photo-placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>Your Photo Here</span>
    </div>
  </div>
</section>

<!-- ============ ABOUT ============ -->
<section id="about">
  <div class="about-inner">
    <div class="reveal">
      <p class="about-label">About</p>
      <h2 class="about-heading">A little about me.</h2>
      <div class="scroll-hint">Scroll to explore</div>
    </div>
    <div class="reveal" style="transition-delay:150ms">
      <p class="about-body" id="about-text"></p>
    </div>
  </div>
</section>

<!-- ============ EXPERIENCE PREVIEW ============ -->
<section id="work">
  <div class="work-inner">

    <div class="work-header reveal">
      <div>
        <span class="section-label">Career</span>
        <h2>Experience</h2>
      </div>
      <a class="view-all" href="pages/experience.html">
        View all
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg>
      </a>
    </div>

    <div class="cards-grid" id="exp-cards" data-stagger></div>

    <div class="section-divider" style="margin-top:5rem;margin-bottom:0"></div>

    <div class="work-header reveal" style="margin-top:5rem">
      <div>
        <span class="section-label">Work</span>
        <h2>Projects</h2>
      </div>
      <a class="view-all" href="pages/projects.html">
        View all
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg>
      </a>
    </div>

    <div class="cards-grid" id="proj-cards" data-stagger></div>
  </div>
</section>

<!-- ============ FOOTER ============ -->
<footer>
  <span id="footer-text"></span>
</footer>

<script src="config.js"></script>
<script>
  // ---- Populate from config ----
  document.getElementById('page-title').textContent = PORTFOLIO.name + ' — Portfolio';
  document.getElementById('nav-name').textContent = PORTFOLIO.name.split(' ').map(w=>w[0]).join('');
  document.getElementById('hero-eyebrow').textContent = PORTFOLIO.title;
  document.getElementById('hero-name').textContent = PORTFOLIO.name;
  document.getElementById('hero-tagline').textContent = PORTFOLIO.tagline;
  document.getElementById('about-text').innerHTML = PORTFOLIO.aboutText;
  document.getElementById('footer-text').textContent = `© ${new Date().getFullYear()} ${PORTFOLIO.name}. All rights reserved.`;

  // Profile photo
  if (PORTFOLIO.profilePhoto) {
    const slot = document.getElementById('hero-photo-slot');
    const img = new Image();
    img.src = PORTFOLIO.profilePhoto;
    img.className = 'hero-photo';
    img.alt = PORTFOLIO.name;
    img.onload = () => { slot.outerHTML = img.outerHTML; };
  }

  // Build experience cards (show first 3)
  const expGrid = document.getElementById('exp-cards');
  PORTFOLIO.experience.slice(0, 3).forEach(item => {
    expGrid.insertAdjacentHTML('beforeend', `
      <a class="card reveal" href="pages/exp-detail.html?id=${item.id}">
        <div class="card-img">
          ${item.photo ? `<img src="../${item.photo}" alt="${item.company}" onerror="this.parentElement.innerHTML='<span>${item.company}</span>'" />` : `<span>${item.company}</span>`}
        </div>
        <div class="card-body">
          <p class="card-meta">${item.period} · ${item.location}</p>
          <h3 class="card-title">${item.role} <span style="font-weight:300">at ${item.company}</span></h3>
          <p class="card-summary">${item.summary}</p>
          <div class="tags">${item.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          <span class="card-arrow">Read more →</span>
        </div>
      </a>`);
  });

  // Build project cards (show first 4)
  const projGrid = document.getElementById('proj-cards');
  PORTFOLIO.projects.slice(0, 67).forEach(item => {
    projGrid.insertAdjacentHTML('beforeend', `
      <a class="card reveal" href="pages/proj-detail.html?id=${item.id}">
        <div class="card-img">
          ${item.photo ? `<img src="../${item.photo}" alt="${item.title}" onerror="this.parentElement.innerHTML='<span>${item.category}</span>'" />` : `<span>${item.category}</span>`}
        </div>
        <div class="card-body">
          <p class="card-meta">${item.category}</p>
          <h3 class="card-title">${item.title}</h3>
          <p class="card-summary">${item.summary}</p>
          <div class="tags">${item.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          <span class="card-arrow">View project →</span>
        </div>
      </a>`);
  });
</script>
<script src="assets/js/main.js"></script>
</body>
</html>
