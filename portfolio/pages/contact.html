<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .contact-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 8rem 2rem 5rem;
    }
    .contact-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6rem;
      align-items: start;
      width: 100%;
    }
    .contact-left h1 {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 1.5rem;
    }
    .contact-left p {
      font-size: 1rem;
      color: var(--ink-mid);
      line-height: 1.8;
      max-width: 360px;
    }
    .email-block {
      margin-top: 2.5rem;
    }
    .email-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 0.4rem;
    }
    .email-link {
      font-family: var(--font-display);
      font-size: clamp(1.1rem, 2.5vw, 1.6rem);
      font-weight: 400;
      color: var(--ink);
      border-bottom: 2px solid var(--accent);
      transition: color var(--transition);
      display: inline-block;
      line-height: 1.4;
    }
    .email-link:hover { color: var(--accent); }

    .socials-block {
      margin-top: 3rem;
    }
    .socials-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 1rem;
    }
    .socials-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .social-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--ink-mid);
      transition: color var(--transition);
    }
    .social-link:hover { color: var(--accent); }
    .social-link svg { width: 16px; height: 16px; flex-shrink: 0; }
    .social-name {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      width: 80px;
      color: var(--ink-light);
    }
    .social-handle {
      font-size: 0.9rem;
    }

    /* Right side decorative */
    .contact-right {
      padding-top: 2rem;
    }
    .contact-card {
      background: var(--ink);
      color: var(--cream);
      border-radius: var(--radius);
      padding: 3rem;
    }
    .contact-card-quote {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 400;
      font-style: italic;
      line-height: 1.4;
      margin-bottom: 1.5rem;
      color: rgba(245,241,235,0.9);
    }
    .contact-card-name {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-light);
    }
    .availability {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 2rem;
      font-size: 0.8rem;
      color: rgba(245,241,235,0.6);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #5fc47a;
      box-shadow: 0 0 0 3px rgba(95,196,122,0.3);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(95,196,122,0.3); }
      50% { box-shadow: 0 0 0 6px rgba(95,196,122,0.1); }
    }

    @media (max-width: 750px) {
      .contact-inner { grid-template-columns: 1fr; gap: 3rem; }
      .contact-right { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" id="nav-name" href="../index.html">AR</a>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="experience.html">Experience</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<div class="contact-wrap">
  <div class="contact-inner">
    <div class="contact-left reveal">
      <span class="section-label">Get in touch</span>
      <h1 id="contact-heading"></h1>
      <p id="contact-subtext"></p>

      <div class="email-block" id="email-block"></div>
      <div class="socials-block" id="socials-block"></div>
    </div>

    <div class="contact-right reveal" style="transition-delay:200ms">
      <div class="contact-card">
        <p class="contact-card-quote" id="card-tagline">"Good things are built by people who care."</p>
        <p class="contact-card-name" id="card-name"></p>
        <div class="availability">
          <span class="dot"></span>
          <span>Available for new opportunities</span>
        </div>
      </div>
    </div>
  </div>
</div>

<footer>
  <span id="footer-text"></span>
</footer>

<script src="../config.js"></script>
<script>
  document.getElementById('nav-name').textContent = PORTFOLIO.name.split(' ').map(w=>w[0]).join('');
  document.getElementById('footer-text').textContent = `© ${new Date().getFullYear()} ${PORTFOLIO.name}`;
  document.getElementById('contact-heading').textContent = PORTFOLIO.contactHeading;
  document.getElementById('contact-subtext').textContent = PORTFOLIO.contactSubtext;
  document.getElementById('card-tagline').textContent = `"${PORTFOLIO.tagline}"`;
  document.getElementById('card-name').textContent = `— ${PORTFOLIO.name}`;

  // Email
  if (PORTFOLIO.social.email) {
    document.getElementById('email-block').innerHTML = `
      <p class="email-label">Email</p>
      <a class="email-link" href="mailto:${PORTFOLIO.social.email}">${PORTFOLIO.social.email}</a>
    `;
  }

  // Social icons
  const icons = {
    github:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>`,
    linkedin:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>`,
    twitter:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg>`,
    instagram: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>`,
    dribbble:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8.56 2.75c4.37 6.03 6.02 9.42 8.03 17.72m2.54-15.38c-3.72 4.35-8.94 5.66-16.88 5.85m19.5 1.9c-3.5-.93-6.63-.82-8.94 0-2.58.92-5.01 2.86-7.44 6.32"/></svg>`,
  };

  const socialsBlock = document.getElementById('socials-block');
  const socialEntries = Object.entries(PORTFOLIO.social).filter(([k,v]) => k !== 'email' && v);

  if (socialEntries.length) {
    socialsBlock.innerHTML = `
      <p class="socials-label">Socials</p>
      <div class="socials-list">
        ${socialEntries.map(([k,v]) => `
          <a class="social-link" href="${v}" target="_blank" rel="noopener">
            ${icons[k] || ''}
            <span class="social-name">${k.charAt(0).toUpperCase()+k.slice(1)}</span>
            <span class="social-handle">${v.replace(/https?:\/\/(www\.)?/, '').split('/').slice(0,2).join('/')}</span>
          </a>`).join('')}
      </div>`;
  }
</script>
<script src="../assets/js/main.js"></script>
</body>
</html>
