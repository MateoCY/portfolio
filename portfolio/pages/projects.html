<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .page-hero {
      padding: 9rem 2rem 5rem;
      max-width: var(--max-w);
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
    }
    .page-hero h1 {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .page-hero p {
      font-size: 1rem;
      color: var(--ink-mid);
      max-width: 480px;
      margin-top: 1rem;
    }
    .proj-section {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }
    .proj-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 40px rgba(26,23,20,0.1);
      border-color: var(--ink-light);
    }
    .card-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: linear-gradient(135deg, var(--border), var(--ink-light));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cream);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      overflow: hidden;
    }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    .card-body { padding: 1.25rem 1.4rem 1.5rem; }
    .card-meta { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.4rem; }
    .card-title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; line-height: 1.3; margin-bottom: 0.6rem; }
    .card-summary { font-size: 0.875rem; color: var(--ink-mid); line-height: 1.6; }
    .card-arrow { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-top: 1rem; transition: gap var(--transition); }
    .card:hover .card-arrow { gap: 0.55rem; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" id="nav-name" href="../index.html">AR</a>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="experience.html">Experience</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<header class="page-hero reveal">
  <span class="section-label">Work</span>
  <h1>Projects</h1>
  <p>Some of the things I've built in my free time.</p>
</header>

<section class="proj-section">
  <div class="proj-grid" id="proj-grid" data-stagger></div>
</section>

<footer>
  <span id="footer-text"></span>
</footer>

<script src="../config.js"></script>
<script>
  document.getElementById('nav-name').textContent = PORTFOLIO.name.split(' ').map(w=>w[0]).join('');
  document.getElementById('footer-text').textContent = `© ${new Date().getFullYear()} ${PORTFOLIO.name}`;

  const grid = document.getElementById('proj-grid');
  PORTFOLIO.projects.forEach(item => {
    grid.insertAdjacentHTML('beforeend', `
      <a class="card reveal" href="proj-detail.html?id=${item.id}">
        <div class="card-img">
          ${item.photo ? `<img src="../${item.photo}" alt="${item.title}" onerror="this.parentElement.innerHTML='<span>${item.category}</span>'" />` : `<span>${item.category}</span>`}
        </div>
        <div class="card-body">
          <p class="card-meta">${item.category}</p>
          <h3 class="card-title">${item.title}</h3>
          <p class="card-summary">${item.summary}</p>
          <div class="tags">${item.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          <span class="card-arrow">View project →</span>
        </div>
      </a>`);
  });
</script>
<script src="../assets/js/main.js"></script>
</body>
</html>
