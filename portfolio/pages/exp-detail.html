<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experience Detail</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .detail-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 9rem 2rem 6rem;
    }
    .detail-meta {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }
    .detail-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.35rem;
    }
    .detail-subtitle {
      font-size: 1.1rem;
      color: var(--ink-mid);
      margin-bottom: 2.5rem;
    }
    .detail-photo {
      width: 100%;
      aspect-ratio: 16/7;
      object-fit: cover;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--border), var(--ink-light));
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cream);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      overflow: hidden;
    }
    .detail-photo img { width: 100%; height: 100%; object-fit: cover; }
    .detail-body {
      font-size: 1rem;
      line-height: 1.85;
      color: var(--ink);
    }
    .detail-body ul { padding-left: 1.5rem; list-style: disc; }
    .detail-body li { margin-bottom: 0.4rem; }
    .not-found {
      text-align: center;
      padding: 6rem 2rem;
      color: var(--ink-mid);
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" id="nav-name" href="../index.html">AR</a>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="experience.html">Experience</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<div class="detail-wrap" id="detail-content">
  <div class="not-found">Loading…</div>
</div>

<footer>
  <span id="footer-text"></span>
</footer>

<script src="../config.js"></script>
<script>
  document.getElementById('nav-name').textContent = PORTFOLIO.name.split(' ').map(w=>w[0]).join('');
  document.getElementById('footer-text').textContent = `© ${new Date().getFullYear()} ${PORTFOLIO.name}`;

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const item = PORTFOLIO.experience.find(e => e.id === id);
  const wrap = document.getElementById('detail-content');

  if (!item) {
    wrap.innerHTML = `<div class="not-found"><p>Experience entry not found.</p><a class="back-link" href="experience.html">← Back to Experience</a></div>`;
  } else {
    document.title = `${item.role} at ${item.company}`;
    wrap.innerHTML = `
      <a class="back-link" href="experience.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>
        All Experience
      </a>
      <p class="detail-meta">${item.period} · ${item.location}</p>
      <h1 class="detail-title">${item.role}</h1>
      <p class="detail-subtitle">at ${item.company}</p>
      <div class="detail-photo">
        ${item.photo ? `<img src="../${item.photo}" alt="${item.company}" onerror="this.parentElement.innerHTML='<span>${item.company}</span>'" />` : `<span>${item.company}</span>`}
      </div>
      <div class="tags" style="margin-bottom:2rem">${item.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="detail-body">${item.details}</div>
    `;
  }
</script>
<script src="../assets/js/main.js"></script>
</body>
</html>
