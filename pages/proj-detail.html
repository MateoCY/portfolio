<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Detail</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .detail-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 9rem 2rem 6rem;
    }
    .detail-meta { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem; }
    .detail-title { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 2rem; }
    .detail-photo {
      width: 100%;
      aspect-ratio: 16/8;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--border), var(--ink-light));
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cream);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      overflow: hidden;
    }
    .detail-photo img { width: 100%; height: 100%; object-fit: cover; }
    .detail-body { font-size: 1rem; line-height: 1.85; color: var(--ink); }
    .detail-body ul { padding-left: 1.5rem; list-style: disc; }
    .detail-body li { margin-bottom: 0.4rem; }
    .ext-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2.5rem;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--cream);
      background: var(--accent);
      padding: 0.8rem 1.6rem;
      border-radius: var(--radius);
      transition: background var(--transition), transform var(--transition);
    }
    .ext-link:hover { background: var(--ink); transform: translateY(-2px); }
    .not-found { text-align: center; padding: 6rem 2rem; color: var(--ink-mid); }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" id="nav-name" href="../index.html">AR</a>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="experience.html">Experience</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<div class="detail-wrap" id="detail-content">
  <div class="not-found">Loading…</div>
</div>

<footer>
  <span id="footer-text"></span>
</footer>

<script src="../config.js"></script>
<script>
  document.getElementById('nav-name').textContent = PORTFOLIO.name.split(' ').map(w=>w[0]).join('');
  document.getElementById('footer-text').textContent = `© ${new Date().getFullYear()} ${PORTFOLIO.name}`;

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const item = PORTFOLIO.projects.find(p => p.id === id);
  const wrap = document.getElementById('detail-content');

  if (!item) {
    wrap.innerHTML = `<div class="not-found"><p>Project not found.</p><a class="back-link" href="projects.html">← Back to Projects</a></div>`;
  } else {
    document.title = item.title;
    const linkHtml = item.link
      ? `<a class="ext-link" href="${item.link}" target="_blank" rel="noopener">
           View project
           <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7,7 17,7 17,17"/></svg>
         </a>`
      : '';
    wrap.innerHTML = `
      <a class="back-link" href="projects.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>
        All Projects
      </a>
      <p class="detail-meta">${item.category}</p>
      <h1 class="detail-title">${item.title}</h1>
      <div class="detail-photo">
        ${item.photo ? `<img src="../${item.photo}" alt="${item.title}" onerror="this.parentElement.innerHTML='<span>${item.category}</span>'" />` : `<span>${item.category}</span>`}
      </div>
      <div class="tags" style="margin-bottom:2rem">${item.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="detail-body">${item.details}</div>
      ${linkHtml}
    `;
  }
</script>
<script src="../assets/js/main.js"></script>
</body>
</html>
