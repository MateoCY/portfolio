<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experience</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .page-hero {
      padding: 9rem 2rem 5rem;
      max-width: var(--max-w);
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
    }
    .page-hero h1 {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .page-hero p {
      font-size: 1rem;
      color: var(--ink-mid);
      max-width: 480px;
      margin-top: 1rem;
    }
    .exp-list {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }
    .exp-item {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 3rem;
      padding: 3.5rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: background var(--transition);
    }
    .exp-item:hover .exp-company { color: var(--accent); }
    .exp-left { padding-top: 0.25rem; }
    .exp-company {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      transition: color var(--transition);
      margin-bottom: 0.25rem;
    }
    .exp-period {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-light);
    }
    .exp-photo {
      width: 100%;
      aspect-ratio: 16/7;
      object-fit: cover;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--border), var(--ink-light));
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cream);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      overflow: hidden;
    }
    .exp-photo img { width: 100%; height: 100%; object-fit: cover; }
    .exp-role {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }
    .exp-summary {
      font-size: 0.9rem;
      color: var(--ink-mid);
      line-height: 1.7;
      margin-bottom: 0.75rem;
    }
    @media (max-width: 650px) {
      .exp-item { grid-template-columns: 1fr; gap: 1rem; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" id="nav-name" href="../index.html">AR</a>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="experience.html">Experience</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<header class="page-hero reveal">
  <span class="section-label">Career</span>
  <h1>Experience</h1>
  <p>A timeline of roles, companies, and the work I'm proud of.</p>
</header>

<section class="exp-list" id="exp-list"></section>

<footer>
  <span id="footer-text"></span>
</footer>

<script src="../config.js"></script>
<script>
  document.getElementById('nav-name').textContent = PORTFOLIO.name.split(' ').map(w=>w[0]).join('');
  document.getElementById('footer-text').textContent = `© ${new Date().getFullYear()} ${PORTFOLIO.name}`;

  const list = document.getElementById('exp-list');
  PORTFOLIO.experience.forEach(item => {
    list.insertAdjacentHTML('beforeend', `
      <a class="exp-item reveal" href="exp-detail.html?id=${item.id}">
        <div class="exp-left">
          <div class="exp-company">${item.company}</div>
          <div class="exp-period">${item.period}</div>
        </div>
        <div class="exp-right">
          <div class="exp-photo">
            ${item.photo ? `<img src="../${item.photo}" alt="${item.company}" onerror="this.style.display='none'" />` : item.company}
          </div>
          <div class="exp-role">${item.role} · <span style="color:var(--ink-light)">${item.location}</span></div>
          <p class="exp-summary">${item.summary}</p>
          <div class="tags">${item.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          <span class="card-arrow" style="display:inline-flex;align-items:center;gap:.3rem;font-size:.72rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-top:1rem;">Full details →</span>
        </div>
      </a>`);
  });
</script>
<script src="../assets/js/main.js"></script>
</body>
</html>
